name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t todo-backend:latest ./backend

      - name: Build frontend image
        run: docker build -t todo-frontend:latest ./frontend

      - name: Create network
        run: docker network create todo-network

      - name: Start PostgreSQL
        run: |
          docker run -d --name todo-db --network todo-network \
            -e POSTGRES_DB=tododb \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            postgres:15-alpine

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 20); do
            docker exec todo-db pg_isready -U postgres -d tododb -q && exit 0
            echo "[$i/20] not ready, waiting 3s..."
            sleep 3
          done
          docker logs todo-db && exit 1

      - name: Start backend
        run: |
          docker run -d --name todo-backend --network todo-network \
            -p 5000:5000 \
            -e DB_HOST=todo-db -e DB_PORT=5432 \
            -e DB_NAME=tododb -e DB_USER=postgres -e DB_PASSWORD=postgres \
            todo-backend:latest

      - name: Start frontend
        run: |
          docker run -d --name todo-frontend --network todo-network \
            -p 3000:80 \
            todo-frontend:latest

      - name: Wait for backend /health
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:5000/health > /dev/null && exit 0
            echo "[$i/15] backend not ready, waiting 4s..."
            sleep 4
          done
          docker logs todo-backend && exit 1

      - name: Test GET /health
        run: |
          R=$(curl -sf http://localhost:5000/health)
          echo "$R" | grep -q '"status":"ok"' || (echo "FAIL: $R" && exit 1)
          echo "PASS /health"

      - name: Test GET /api/tasks
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/tasks)
          [ "$CODE" = "200" ] || (echo "FAIL: HTTP $CODE" && exit 1)
          curl -sf http://localhost:5000/api/tasks | \
            python3 -c "import sys,json; assert isinstance(json.load(sys.stdin), list)"
          echo "PASS /api/tasks"

      - name: Test GET /api/chat
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/chat)
          [ "$CODE" = "200" ] || (echo "FAIL: HTTP $CODE" && exit 1)
          curl -sf http://localhost:5000/api/chat | \
            python3 -c "import sys,json; assert isinstance(json.load(sys.stdin), list)"
          echo "PASS /api/chat"

      - name: Cleanup containers and network
        if: always()
        run: |
          docker stop todo-frontend todo-backend todo-db || true
          docker rm   todo-frontend todo-backend todo-db || true
          docker network rm todo-network || true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag and push backend image
        run: |
          docker tag todo-backend:latest ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-backend:latest

      - name: Tag and push frontend image
        run: |
          docker tag todo-frontend:latest ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/todo-frontend:latest
