server {
    listen 80;

    # ── Статика React-приложения ──────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ── Проксирование REST API ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://todo-backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Проксирование WebSocket ────────────────────────────────────────────────
    #
    #  WebSocket начинается как обычный HTTP GET с заголовком "Upgrade: websocket".
    #  Nginx по умолчанию не передаёт заголовки Upgrade и Connection бэкенду,
    #  поэтому их нужно явно задать.
    #
    #  proxy_http_version 1.1
    #    WebSocket требует HTTP/1.1 (HTTP/1.0 не поддерживает keep-alive,
    #    а для upgrade нужно постоянное соединение).
    #
    #  proxy_set_header Upgrade $http_upgrade
    #    Передаём заголовок "Upgrade: websocket" от клиента дальше на бэкенд.
    #    $http_upgrade — встроенная переменная Nginx со значением этого заголовка.
    #
    #  proxy_set_header Connection "upgrade"
    #    Сообщаем бэкенду, что соединение нужно переключить (upgrade).
    #    Важно: используем строку "upgrade", а не переменную $connection_upgrade,
    #    так как проще и достаточно для одного upstream.
    #
    #  proxy_read_timeout / proxy_send_timeout
    #    По умолчанию Nginx закрывает idle-соединение через 60 секунд.
    #    Для WebSocket нужен большой таймаут, иначе длинные соединения
    #    будут неожиданно рваться.
    #
    location /ws {
        proxy_pass http://todo-backend:5000;

        proxy_http_version 1.1;

        # Заголовки для WebSocket-рукопожатия (handshake)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Передаём оригинальный хост и IP
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;

        # Держим соединение открытым долго (WebSocket — persistent connection)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
